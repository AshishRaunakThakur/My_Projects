<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding-top: 30px;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo i { font-size: 28px; color: #667eea; }
        .logo span { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: #667eea; }
        .login-btn { padding: 10px 25px; border-radius: 50px; transition: 0.3s; }
        .login-btn:hover { transform: translateY(-2px); }
        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 50px auto;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo-center { text-align: center; margin-bottom: 40px; }
        .logo-center i { font-size: 60px; color: #667eea; }
        .logo-center h2 { font-size: 32px; color: #333; margin-top: 10px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(102,126,234,0.5); }
        .forgot-password { text-align: center; margin: 15px 0; }
        .forgot-password a { color: #667eea; text-decoration: none; }
        .register-link { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .register-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .flash-messages { margin-bottom: 20px; }
        .flash-message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flash-message.success { background: #d4edda; color: #155724; }
        .flash-message.error { background: #f8d7da; color: #721c24; }
        @media (max-width: 768px) {
            .login-card { padding: 30px 20px; }
            .nav-links { gap: 10px; }
            .login-btn { padding: 8px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    {% include 'header.html' %}

    <div class="login-container">
        <div class="login-card">
            <div class="logo-center">
                <i class="fas fa-book"></i>
                <h2>Welcome Back</h2>
                <p style="color: #666;">Login to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">
                                <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>

            <div class="forgot-password">
                <a href="{{ url_for('forgot_password') }}"><i class="fas fa-key"></i> Forgot Password?</a>
            </div>

            <div class="register-link">
                Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
            </div>
        </div>
    </div>
</body>
</html>
