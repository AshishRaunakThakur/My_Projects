<!-- templates/verify_otp.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        .card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo i { font-size: 60px; color: #667eea; }
        .logo h2 { font-size: 32px; color: #333; margin-top: 10px; }
        .email-display {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            font-weight: 600;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-link { text-align: center; }
        .back-link a { color: #667eea; text-decoration: none; }
        .flash-messages { margin-bottom: 20px; }
        .flash-message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flash-message.success { background: #d4edda; color: #155724; }
        .flash-message.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-envelope"></i>
                <h2>Verify OTP</h2>
            </div>

            <div class="email-display">
                <strong>{{ email }}</strong>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">
                                <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <i class="fas fa-key"></i>
                    <input type="text" name="otp" placeholder="6-digit OTP" maxlength="6" pattern="\d{6}" required autofocus>
                </div>
                <button type="submit" class="btn-primary">Verify OTP</button>
            </form>

            <div class="back-link">
                <a href="{{ url_for('forgot_password') }}">Try Again</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('input[name="otp"]').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
            if (this.value.length === 6) setTimeout(() => this.form.submit(), 300);
        });
    </script>
</body>
</html>
