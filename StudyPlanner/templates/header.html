<!-- templates/header.html -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo" style="text-decoration: none;">
            <i class="fas fa-book"></i>
            <span>StudyPlanner</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#features">Features</a>
            {% if 'user_id' in session %}
                <a href="/dashboard">Dashboard</a>
                <a href="/logout" class="login-btn" style="background: #ff6b6b; color: white;">Logout</a>
            {% else %}
                <a href="/login" class="login-btn" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">Login</a>
                <a href="/register" class="login-btn" style="background: #667eea20; color: #667eea;">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
    // Add loading animation on page navigation
    document.querySelectorAll('.nav-links a, .logo').forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (href && !href.startsWith('#') && href !== 'javascript:void(0)') {
                e.preventDefault();
                showLoader();
                setTimeout(() => {
                    window.location.href = href;
                }, 500);
            }
        });
    });
    
    function showLoader() {
        let loader = document.getElementById('page-loader');
        if (!loader) {
            loader = document.createElement('div');
            loader.id = 'page-loader';
            loader.innerHTML = `
                <div class="loader-overlay">
                    <div class="loader-spinner">
                        <i class="fas fa-book"></i>
                        <div class="loader-text">Loading...</div>
                    </div>
                </div>
            `;
            document.body.appendChild(loader);
            
            // Add styles for loader
            const style = document.createElement('style');
            style.textContent = `
                .loader-overlay {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    animation: fadeIn 0.3s ease;
                }
                .loader-spinner {
                    text-align: center;
                    animation: bounce 0.5s ease infinite;
                }
                .loader-spinner i {
                    font-size: 60px;
                    color: white;
                    animation: spin 1s linear infinite;
                }
                .loader-text {
                    color: white;
                    font-size: 18px;
                    margin-top: 20px;
                    font-weight: 500;
                }
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
                @keyframes bounce {
                    0%, 100% { transform: translateY(0); }
                    50% { transform: translateY(-20px); }
                }
                @keyframes fadeIn {
                    from { opacity: 0; }
                    to { opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        }
        loader.style.display = 'block';
    }
    
    // Hide loader when page loads
    window.addEventListener('load', function() {
        const loader = document.getElementById('page-loader');
        if (loader) {
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    });
</script>
